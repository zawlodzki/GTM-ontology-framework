# A9 — existing automation. Agents use this to ATTRIBUTE data and avoid conflicts.
kind: automation
id: qualify-from-transcript
name: Qualify deal from call transcript
description: >
  n8n workflow: new Fireflies transcript -> LLM fills AI qualification fields on the deal.
meta: {source: declared, status: draft, updated: 2026-01-01}
platform: n8n                      # crm-native | n8n | zapier | make | custom-script | other
status_live: active                # active | paused | unknown
owner: RevOps (Anna)
definition_url: https://n8n.internal/workflow/42

trigger:
  event: new call transcript available
  object: object:deal
  conditions:
    - deal is in stage 'qualified' or earlier
    - transcript matched to deal via attendee email

effects:
  - target: property:deal.ai_qualification_summary
    operation: write
    detail: LLM output per prompt:lead-qualification
  - target: property:deal.ai_qualification_score
    operation: write
    detail: 0-100 integer

data_fingerprint:                  # >= 1 key required — how to recognize this automation's output
  acting_user: "api-bot@company.com (Pipedrive user id 42)"
  field_patterns:
    - "ai_qualification_summary starts with '## Qualification'"
  marker: "note added: '[auto] qualification updated'"
  timing: "within ~10 min after call end"

failure_modes:
  - symptom: transcript not matched (email mismatch)
    impact: fields stay empty — NOT a signal of poor qualification
    detection: call activity exists but summary empty > 1h
