# A7 — cross-system identity resolution (record linkage + MDM-style survivorship)
# and intra-base deduplication (same-entity detection + merge policy).
kind: identity
id: identity
meta: {source: declared, status: draft, updated: 2026-01-01}
resolutions:
  - object: object:person
    natural_keys: [email]          # ordered by preference
    sources:
      - {system: "system:pipedrive", role: master}
      - {system: "system:mailerlite", role: secondary}
    inclusion: union               # union = everyone; intersection = only present in all
    conflict_strategy: master_wins # master_wins | most_recent | per_field
    per_field: []                  # if per_field: [{property: phone, winner: "system:pipedrive"}]
    match:                         # dedup rules (optional). See docs/03-artifact-formats.md A7.
      keys:                        # combinations asserting "same record"; strongest first
        - {fields: [email], type: deterministic}
      distinguishing_fields:       # differ => DISTINCT entity; vetoes an auto-merge
        - {field: email, reason: "shared-phone colleagues/family are separate people"}
      never_match_on:              # forbidden as a whole/sole key (non-unique or shared)
        - {fields: [phone], reason: "company / household phone is shared"}
        - {fields: [full_name], reason: "namesakes"}
      merge:
        auto: "a deterministic key matches AND no distinguishing_field differs"
        review: "a probabilistic key matches OR any distinguishing_field differs"
        loser: redirect_refs       # redirect_refs | soft_delete | keep_linked

  - object: object:organization
    natural_keys: [domain, vat_id]
    sources:
      - {system: "system:pipedrive", role: master}
    inclusion: union
    conflict_strategy: master_wins
    match:
      keys:
        - {fields: [vat_id], type: deterministic}                    # one legal entity
        - {fields: [domain, address_locality], type: deterministic}  # combination
        - {fields: [name, address_postal_code], type: probabilistic,
           similarity: {name: 0.9}, on_match: review}                # fuzzy -> review only
      distinguishing_fields:
        - {field: address, reason: "branch offices share domain+name but are separate sites"}
        - {field: vat_id,  reason: "distinct legal entities never merge"}
      never_match_on:
        - {fields: [domain], reason: "every branch shares one domain"}
        - {fields: [name],   reason: "non-unique; parent and subsidiary collide"}
      merge:
        auto: "a deterministic key matches AND no distinguishing_field differs"
        review: "a probabilistic key matches OR any distinguishing_field differs"
        loser: redirect_refs
