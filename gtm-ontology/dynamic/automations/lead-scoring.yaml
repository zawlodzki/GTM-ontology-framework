kind: automation
id: lead-scoring
name: Lead scoring & MQL promotion
description: >
  n8n workflow: nightly + on new person. Enriches organization (industry, size),
  computes icp_fit and engagement_score, promotes lifecycle_stage lead -> mql
  when conditions met; creates deal for inbound demo requests.
meta: {source: declared, status: confirmed, confirmed_by: "Anna (RevOps)", updated: 2026-07-01}
platform: n8n
status_live: active
owner: RevOps (Anna)
definition_url: https://n8n.acme-analytics.internal/workflow/17

trigger:
  event: "nightly 02:00 CET + webhook on person created"
  object: object:person
  conditions:
    - person has email
    - organization linked or resolvable by email domain

effects:
  - {target: "property:organization.industry", operation: write, detail: from enrichment provider}
  - {target: "property:organization.employee_count", operation: write, detail: from enrichment provider}
  - {target: "property:organization.icp_fit", operation: write, detail: computed boolean}
  - {target: "property:person.engagement_score", operation: write, detail: 0-100 recomputed}
  - {target: "property:person.lifecycle_stage", operation: write, detail: "lead -> mql when entry_conditions met"}
  - {target: "object:deal", operation: create, detail: "for inbound demo requests: deal in Incoming, source_channel=inbound-form"}

data_fingerprint:
  acting_user: "api-bot@acme-analytics.com (Pipedrive user id 42)"
  field_patterns:
    - "update timestamps cluster 02:00-02:30 CET"
    - "deals created with title '<Org> — inbound' and stage Incoming"
  marker: "note '[auto] scored: <score>' on person after each run"
  timing: "nightly batch; webhook path within ~2 min of person creation"

failure_modes:
  - symptom: enrichment provider timeout
    impact: icp_fit stays null — person can NOT become MQL; not a rejection
    detection: "orgs with null icp_fit older than 48h"
  - symptom: n8n workflow paused
    impact: engagement_score stale, MQL flow stops silently
    detection: "no '[auto] scored' notes for > 24h"
