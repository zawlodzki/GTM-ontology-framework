name: Context competency evals

on:
  pull_request:
    paths:
      - ".github/workflows/context-competency-evals.yml"
      - "evals/**"
      - "schemas/context-eval-*.schema.json"
      - "tools/evaluate_context.py"
      - "tools/test_evaluate_context.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/context-competency-evals.yml"
      - "evals/**"
      - "schemas/context-eval-*.schema.json"
      - "tools/evaluate_context.py"
      - "tools/test_evaluate_context.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install evaluator dependencies
        run: python -m pip install pyyaml jsonschema

      - name: Test evaluator
        run: python -m unittest tools.test_evaluate_context -v

      - name: Evaluate golden responses
        run: python tools/evaluate_context.py evals/context-competency.yaml evals/fixtures/golden.jsonl

      - name: Confirm negative fixtures fail
        shell: bash
        run: |
          set -euo pipefail
          for fixture in \
            evals/fixtures/fail-routing.jsonl \
            evals/fixtures/fail-governance-action.jsonl \
            evals/fixtures/fail-provenance-privacy.jsonl
          do
            if python tools/evaluate_context.py evals/context-competency.yaml "$fixture"; then
              echo "Expected $fixture to fail" >&2
              exit 1
            fi
          done
