name: Context competency evals

on:
  pull_request:
    paths:
      - ".github/workflows/context-competency-evals.yml"
      - "evals/**"
      - "schemas/context-eval-*.schema.json"
      - "tools/evaluate_context.py"
      - "tools/test_evaluate_context.py"
      - "skills/gtm-context-evaluator/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/context-competency-evals.yml"
      - "evals/**"
      - "schemas/context-eval-*.schema.json"
      - "tools/evaluate_context.py"
      - "tools/test_evaluate_context.py"
      - "skills/gtm-context-evaluator/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install evaluator dependencies
        run: python -m pip install pyyaml jsonschema

      - name: Test evaluator
        run: python -m unittest tools.test_evaluate_context -v

      - name: Test standalone evaluator skill
        run: python -m unittest discover -s skills/gtm-context-evaluator/tests -p "test_*.py" -v

      - name: Prepare expectation-free prompts with standalone skill
        run: |
          python skills/gtm-context-evaluator/scripts/prepare_eval_prompts.py \
            evals/context-competency.yaml /tmp/context-eval-prompts.jsonl \
            --workspace-root .
          test "$(wc -l < /tmp/context-eval-prompts.jsonl)" -eq 9
          if grep -E 'expectations|allowed_decisions|expected_action_ref' /tmp/context-eval-prompts.jsonl; then
            echo "Prompt pack leaks evaluator expectations" >&2
            exit 1
          fi

      - name: Evaluate golden responses with standalone skill
        run: >-
          python skills/gtm-context-evaluator/scripts/evaluate_context.py
          evals/context-competency.yaml evals/fixtures/golden.jsonl

      - name: Confirm negative fixtures fail
        shell: bash
        run: |
          set -euo pipefail
          for fixture in \
            evals/fixtures/fail-routing.jsonl \
            evals/fixtures/fail-governance-action.jsonl \
            evals/fixtures/fail-provenance-privacy.jsonl
          do
            report="$(mktemp)"
            if python skills/gtm-context-evaluator/scripts/evaluate_context.py \
              evals/context-competency.yaml "$fixture" > "$report"; then
              echo "Expected $fixture to fail" >&2
              exit 1
            fi
            python - "$report" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as stream:
              report = json.load(stream)
          if report.get("passed") is not False:
              raise SystemExit("Negative fixture did not produce passed=false")
          if report.get("input_failures"):
              raise SystemExit(f"Negative fixture has input failures: {report['input_failures']}")
          if report.get("structural_failures"):
              raise SystemExit(f"Negative fixture has structural failures: {report['structural_failures']}")
          if not any(not case["passed"] for case in report.get("cases", [])):
              raise SystemExit("Negative fixture did not fail a hard evaluation check")
          PY
            rm "$report"
          done
